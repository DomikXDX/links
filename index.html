<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ссылки Домика</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #ffffff;
            /* Тёмная основа с насыщенными неоновыми оттенками радуги */
            background: linear-gradient(45deg, #15001a, #000b1a, #001a11, #1a1600, #1a0000);
            background-size: 400% 400%;
            /* Плавное переливание радуги */
            animation: darkRainbow 12s ease infinite;
            overflow: hidden;
        }

        @keyframes darkRainbow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.4);
            padding: 40px 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
            max-width: 90%;
            width: 400px;
        }

        h1 {
            font-size: 2.3rem;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .link-card {
            display: flex;
            flex-direction: column;
            gap: 15px; /* Отступ между кнопками */
            align-items: center;
        }

        /* Общие стили для всех кнопок */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-3px);
        }

        .btn:active {
            transform: translateY(-1px);
        }

        /* Фирменный стиль для Twitch */
        .twitch-btn {
            background: #9146FF;
            box-shadow: 0 4px 15px rgba(145, 70, 255, 0.3);
        }
        .twitch-btn:hover {
            background: #772ce8;
            box-shadow: 0 6px 20px rgba(145, 70, 255, 0.5);
        }

        /* Фирменный стиль для Discord */
        .discord-btn {
            background: #5865F2;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.3);
        }
        .discord-btn:hover {
            background: #4752c4;
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.5);
        }

        /* Фирменный стиль для DonationAlerts */
        .donate-btn {
            background: #FF9E00;
            box-shadow: 0 4px 15px rgba(255, 158, 0, 0.3);
        }
        .donate-btn:hover {
            background: #e68e00;
            box-shadow: 0 6px 20px rgba(255, 158, 0, 0.5);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Ссылки Домика</h1>
        <div class="link-card">
            <!-- Кнопка Twitch -->
            <a href="https://www.twitch.tv/domik_xdx" target="_blank" class="btn twitch-btn">
                Twitch
            </a>
            
            <!-- Кнопка Discord -->
            <a href="https://discord.gg/JbvFwmAuk" target="_blank" class="btn discord-btn">
                Discord Сервер
            </a>
            
            <!-- Кнопка Доната -->
            <a href="https://www.donationalerts.com/r/xxx_domik_xxx" target="_blank" class="btn donate-btn">
                Поддержать (Донат)
            </a>
        </div>
    </div>

</body>
</html>
